; ============================================================================
;  ESP32-WarSniffer  —  PlatformIO project configuration
;  Target board: ESP32-S3-DevKitC-1  (N16R8 = 16 MB flash / 8 MB PSRAM)
; ============================================================================
;
;  Quick start:
;     pio run -t upload          # flash firmware
;     pio run -t uploadfs        # flash web UI (LittleFS  data/ folder)
;     pio device monitor         # serial console (115200)
;
;  After flashing, join the Wi-Fi network "WarSniffer" (default password
;  "sniffsniff") and browse to http://192.168.4.1
; ============================================================================

[platformio]
default_envs = esp32-s3-devkitc1-n16r8
data_dir = data

[env:esp32-s3-devkitc1-n16r8]
platform  = espressif32@^6.7.0
board     = esp32-s3-devkitc-1
framework = arduino

; ---- 16 MB flash + 8 MB Octal PSRAM (N16R8) ----------------------------
; memory_type qio_opi = QIO flash + OPI (octal) PSRAM, required for R8 parts.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions  = partitions.csv
board_build.filesystem  = littlefs

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed    = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -DASYNCWEBSERVER_REGEX
    -DWARSNIFFER_VERSION=\"1.0.0\"
    ; USB-CDC on the native USB port so the serial console works out of the box
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    ; Async web stack (maintained forks)
    esp32async/ESPAsyncWebServer @ ^3.6.0
    esp32async/AsyncTCP @ ^3.3.2
    bblanchon/ArduinoJson @ ^7.1.0
